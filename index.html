<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Zumbis na Quebrada</title>
  <style>
    @font-face { font-family: 'ZnqArcade'; src: url('assets/fonts/ZnqArcade.ttf') format('truetype'); font-display: swap; }
    html, body { margin:0; height:100%; background:#120f1b; overflow:hidden; font-family: 'ZnqArcade', monospace; }
    #wrap { position:fixed; inset:0; display:flex; align-items:center; justify-content:center; background:#120f1b; }
    canvas { width:min(100vw, calc(100vh * 16 / 9)); height:min(100vh, calc(100vw * 9 / 16)); image-rendering: pixelated; image-rendering: crisp-edges; background:#000; touch-action:none; box-shadow:0 0 24px #000; }
    .hint { position:fixed; left:10px; bottom:8px; color:#d4ffe2; font:12px 'ZnqArcade', monospace; opacity:.72; pointer-events:none; }
  </style>
</head>
<body>
  <div id="wrap"><canvas id="game" width="960" height="540"></canvas></div>
  <div class="hint">Zumbis na Quebrada — HTML5 Canvas, PNG/WAV, sem SVG.</div>
  <script src="src/data.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
